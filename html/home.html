<!DOCTYPE html>

<html>
    <head>
        <meta charset="utf-8" />
        <meta http-equiv="X-UA-Compatible" content="IE=edge" />
        <meta name="description" content="" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />

        <title>Home</title>

        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
        <link rel="stylesheet" href="../css/style.css" />
        <link rel="shortcut icon" href="../icons/favicon.png" type="images/#.ico" />

        <style>
            .row-container {
                margin: auto 5vw;
            }

            .title-1 {
                font-family: Krona-one;
                font-size: 2rem;
                color: #CBCBCB
            }

            .title-2 {
                font-family: Inter-bold;
                font-size: 4rem;
            }

            .home-description {
                font-family: Inter-regular;
                font-size: 1.2rem;
                color: #AFAE83;
                margin: 3vh 0;
            }

            .home-button {
                margin: 1rem 0;
                border-radius: 45px;
                padding: 1rem;
                background: linear-gradient(to right, #B640B9, #029797);
                box-shadow: rgba(0, 0, 0, 0.75) 4px 4px 10px 0px;
                transition: transform 300ms ease-in-out;
            }

            .home-button:hover {
                transform: scale(0.95);
            }

            .home-button > a {
                text-decoration: none;
            }

            .home-research-button {
                color: white;
                font-family: Inter-regular;
            }


            .rocket-icon {
                aspect-ratio: 1 / 1;
                width: 1.5rem;
            }

            .handels {
                justify-content: space-between;
                margin: 1rem 0;
            }

            .social-icons {
                aspect-ratio: 1 / 1;
                width: 1.75rem;
                filter: drop-shadow(2px 2px 20px rgba(0, 0, 0, 1));
                transition: transform 300ms ease-in-out;
                margin-right: 1rem;
            }

            .social-icons:hover {
                transform: scale(0.9);
            }
            
            .ado-image {
                aspect-ratio:  1 / 1;
                width: 30vw;
            }
        </style>
    </head>
    <body class="content">
        <!--[if lt IE 7]>
            <p class="browsehappy">You are using an <strong>outdated</strong> browser. Please <a href="#">upgrade your browser</a> to improve your experience.</p>
        <![endif]-->
        <div class="container-fluid">
            <div class="row vh-100 row-container">
                <div class="col-xl-6 col-lg-6">
                    <div class="home-child-container d-flex flex-column h-100 justify-content-xl-center justify-content-lg-center">
                        <h2 class="title-1">
                            ADVANCED DARKSKY
                        </h2>
                        <h1 class="title-2">
                            OBSERVATORY
                        </h1>
                        <span class="home-description">
                            A premium class observatory at<br>Indian Institute of Technology Hyderabad
                        </span>
                        <a href="research.html" target="frame" class="home-button-link">
                                <button class="home-button">
                                <span class="home-research-button">
                                    <img src="../icons/learn-more.svg" alt="Rocket icon" class="rocket-icon">
                                    Learn more ...
                                </span>
                            </button>
                        </a>
                        <div class="handels d-flex flex-row justify-content-start">
                            <a href="#" class="social-links">
                                <img src="../icons/github.svg" alt="Github icon" class="github social-icons">
                            </a>
                            <a href="#" class="social-links">
                                <img src="../icons/facebook-handel.svg" alt="Facebook icon" class="facebook social-icons">
                            </a>
                            <a href="#" class="social-links">
                                <img src="../icons/linkedin-handel.svg" alt="Linkedin icon" class="linkedin social-icons">
                            </a>
                            <a href="#" class="social-links">
                                <img src="../icons/instagram-handel.svg" alt="Instagram icon" class="instagram social-icons">
                            </a>
                        </div>
                    </div>
                </div>
                <div class="col-xl-6 col-lg-6">
                    <div class="home-image-container d-flex flex-column h-100 align-items-xl-end align-items-lg-end justify-content-lg-center">
                        <img src="../images/ado.png" alt="ADO image" class="ado-image">
                    </div>
                </div>
            </div>
        </div>
        <script src="" async defer></script>
    </body>
</html>
