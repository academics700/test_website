        <style>

                min-height: 100%;

                overflow-y: auto;

                border-radius: 50px;
            }

            #first-name {

            }

            }

            #send-button {

            }

                                        <form novalidate id="contact-form" onsubmit="submitForm(event)">
                                            <div class="form-floating">
                                                <input type="text" id="first-name" class="form-control input-mod" placeholder="First name" required />

                                            </div>
                                            <div class="form-floating">
                                                <textarea id="questions" class="form-control input-mod" placeholder="Questions" required></textarea>
                                                <label for="questions" class="label-qs">Your questions ...</label>
                                            </div>
                                            <button id="send-button" class="research-button" type="submit">Send Message</button>
                                        </form>
                                    </div>
                                </div>
